  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sticky Notes App</title>
  <link href="stylesheet" href="styles.css">
  <script src="https://cdn.tailwindcss.com"></script>

</head>
<body>
    <div class="bg-sky-100 min-h-screen p-4">
    
      <div class="text-center mt-10 font-bold text-3xl text-black mb-10 "><h1>Sticky Notes App</h1></div>
      <nextion class="text-center mt-10 font-bold text-1xl text-black mb-10 ">
        <h1>Click the "New" button to create a new sticky note. You can edit the note and it will be saved automatically.</h1>
      </nextion><br/>
      <div class="flex justify-center mb-5 gap-4 ">
        <button id="addNote" class=" static text-md  font-bold text-white bg-green-800 hover:bg-green-700 px-5 py-2 rounded  p-5 " onclick=openNoteDialog()>New </button>
        <button id="deleteNote" class="static text-md font-bold text-white bg-red-800 hover:bg-red-700 px-5 py-2 rounded  p-5 " onclick="closeAllNote()">Delete All </button>
        <br/>
      </div>
   
    </div>

<main id="notesContainer" class="notes-grid"></main>

<dialog id="noteDialog" class="rounded-2xl shadow-2xl w-[420px] p-0 backdrop:bg-black/40">
  
  <div class="bg-blue-800 p-5 rounded-t-2xl flex justify-between items-center">
    <h2 id="dialogTitle" class="text-lg font-semibold text-white">
      Add New Note
    </h2>

    <div class="flex gap-2">
      <button id="editBtn"
        class="bg-white text-gray-700 w-8 h-8 rounded-full font-bold hover:bg-gray-200"
        onclick="editNotedialog()">E</button>

      <button id="close-btn"
        class="bg-white text-gray-700 w-8 h-8 rounded-full font-bold hover:bg-red-200"
        onclick="closeNoteDialog()">✕</button>
    </div>
  </div>

  <form id="noteForm" class="p-6 space-y-4 bg-white rounded-b-2xl">

    <div>
      <label for="noteTitle" class="block text-sm font-semibold text-gray-700 mb-1">
        Title
      </label>
      <input
        type="text"
        id="noteTitle"
        class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-400 outline-none"
        placeholder="Enter note title..."
        required
      />
    </div>

    <div>
      <label for="noteContent" class="block text-sm font-semibold text-gray-700 mb-1">
        Content
      </label>
      <textarea
        id="noteContent"
        class="w-full border border-gray-300 rounded-lg p-2 h-28 resize-none focus:ring-2 focus:ring-blue-400 outline-none"
        placeholder="Write your note here..."
        required
      ></textarea>
    </div>

    <div class="flex justify-end gap-3 pt-2">
      <button
        type="button"
        onclick="closeNoteDialog()"
        class="px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 font-medium">
        Cancel
      </button>

      <button
        type="submit"
        onclick="saveNote()"
        class="px-5 py-2 rounded-lg bg-blue-800 text-white hover:bg-pink-700 font-medium">
        Save
      </button>
    </div>

  </form>
</dialog>
</body>
</html>
